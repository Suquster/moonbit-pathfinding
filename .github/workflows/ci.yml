name: ci

# R10-AC1 : 对所有分支的 push 和 Pull Request 触发
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# R10 · 并发控制:每个 ref 同时最多 1 个运行中 ci run,新提交取消旧 run
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 显式声明最小权限,遵守最小权限原则
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 · 主门禁矩阵 (对应 design.md §15.1 + task 9.1 / infra-suite task 3.1)
  #   矩阵: ubuntu-latest × [wasm-gc, js, native]
  #   步骤: checkout → setup MoonBit → check → fmt --check → test → 可执行文档门禁
  #
  #   全方向模板 (moonbit-infra-suite R11.1):
  #   `moon check` / `moon test` 不指定包名时会作用于模块内全部 src 子包,
  #   因此每新增一个方向子包 src/{方向}, 三后端矩阵会自动对其运行同一测试套件,
  #   接入零成本。任一后端输出分歧 (含快照不一致) 即判定为构建失败。
  #
  #   全部 10 个方向均已纳入本三后端矩阵 (infra-suite task 18.1 / R11.1):
  #     parser_combinator / regex_engine / serialization / build_tool /
  #     logging / codegen_infra / dst / lsp (子包 lsp_binding + lsp_server) /
  #     mini_compiler / actor —— 它们都是 src/ 下的子包, 故由上述"全 src 子包"
  #     规则自动覆盖, 无需在本 workflow 逐一登记。
  #
  #   release-ready 聚合门禁 (infra-suite task 18.1 / R11.6):
  #     src/release_aggregate 子包单向 import 全部 10 个方向, 汇集各方向的
  #     DirectionRelease (release_info_with_gates) 并实现"全部方向 release_ready
  #     才整体就绪"的纯函数聚合判定; 其单元测试同样由本矩阵的 `moon test` 在
  #     三后端执行, 任一方向门禁未全绿即令整体不就绪 (聚合点位于
  #     src/release_aggregate/release_aggregate.mbt::aggregate_suite)。
  #
  #   native 后端说明 (沙箱/本地环境):
  #   native target 链接系统 C 运行时, 在部分沙箱或本地环境需要将
  #   LIBRARY_PATH 指向系统库目录 (例如 `export LIBRARY_PATH=/usr/lib`)
  #   才能完成链接。GitHub-hosted ubuntu-latest runner 默认已具备所需系统库,
  #   故此处不强制注入 LIBRARY_PATH 以免破坏既有 CI 逻辑; 如在自托管或沙箱
  #   环境复用本模板而 native 链接失败, 请在该步骤前 export LIBRARY_PATH。
  # ─────────────────────────────────────────────────────────────
  ci:
    name: ci (${{ matrix.backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 15                       # R10-AC5 · 15 分钟超时兜底
    strategy:
      fail-fast: false                        # 一个后端失败不影响其他后端
      matrix:
        backend: [wasm-gc, js, native, wasm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        uses: hustcer/setup-moonbit@v1

      # ─── 关卡 1: moon check ───────────────────────────────────
      - name: moon check (${{ matrix.backend }})
        run: moon check --target ${{ matrix.backend }}

      # ─── 关卡 2: moon fmt --deny-warn (后端无关,只跑一次节省时间) ─
      #   验收要求的 deny-warn 过程: 新版工具链已移除 fmt/info 的
      #   --deny-warn 参数, scripts/acceptance.sh 探测后以等价语义执行
      #   (fmt --check / info + mbti 无漂移), 并叠加 moon check --deny-warn。
      - name: moon fmt --deny-warn · moon info --deny-warn · moon check --deny-warn
        if: matrix.backend == 'wasm-gc'
        run: bash scripts/acceptance.sh

      # ─── 关卡 3: moon test ────────────────────────────────────
      - name: moon test (${{ matrix.backend }})
        run: moon test --target ${{ matrix.backend }}

      # ─── 关卡 3b: 可执行文档门禁 (R24.4 / task 19.2 / infra-suite R11.4) ─
      #   将原先硬编码的 `moon test README.mbt.md` 固化为全方向模板:
      #   动态发现仓库内所有 `*.mbt.md` 可执行文档 (排除构建产物目录 _build),
      #   逐一作为 black-box test 编译 + 执行 + 快照校验。
      #   这样每新增一个方向子包 src/{方向} 的 *.mbt.md 文档即自动纳入门禁,
      #   无需修改本 workflow (接入零成本)。
      #   任一段示例输出与文档快照不一致, 本步骤 fail → 整个 CI fail,
      #   迫使作者同步更新文档, 实现"文档即测试"(R24.3 / R11.4)。
      #   在 3 后端全部执行, 与多后端一致性门禁 (R11.1) 对齐:
      #   某后端跑不过即说明文档展示的核心逻辑出现一致性回归 (含快照不一致)。
      - name: moon test *.mbt.md (executable docs, ${{ matrix.backend }})
        shell: bash
        run: |
          set -euo pipefail
          # 发现全部可执行文档; 至少包含根目录 README.mbt.md, 向后兼容既有门禁
          mapfile -t docs < <(find . -name '*.mbt.md' -not -path './_build/*' | sort)
          if [ "${#docs[@]}" -eq 0 ]; then
            echo "未发现 *.mbt.md 可执行文档, 跳过文档门禁"
            exit 0
          fi
          echo "发现 ${#docs[@]} 个可执行文档:"
          printf '  %s\n' "${docs[@]}"
          for doc in "${docs[@]}"; do
            echo "== moon test ${doc} --target ${{ matrix.backend }} =="
            moon test "${doc}" --target ${{ matrix.backend }}
          done

      # ─── 辅助: moon info 生成 mbti,确保 API 可见性无回归 ──────
      - name: moon info (interface drift gate)
        if: matrix.backend == 'wasm-gc'
        run: |
          moon info
          git diff --exit-code -- ':(glob)**/*.mbti'

  # ─────────────────────────────────────────────────────────────
  # Job 1b · WASI 交付门禁 (平台轴第六级)
  #   `moon build --release --target wasm` 的独立 wasm 工件在标准 WASI
  #   运行时 (wasmtime) 下直接执行, 输出与 js 后端逐字节 diff 一致。
  # ─────────────────────────────────────────────────────────────
  wasi:
    name: wasi delivery gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        uses: hustcer/setup-moonbit@v1

      - name: Install wasmtime
        run: |
          curl -fsSL https://wasmtime.dev/install.sh | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: WASI gate (wasmtime vs js backend byte diff)
        run: bash scripts/wasi_gate.sh

  # ─────────────────────────────────────────────────────────────
  # Job 2 · 覆盖率报告 + 85% 硬门禁 (关卡 4, 对应 design.md §15.3)
  #   task 28.2 升级: 从 best-effort → 硬门禁
  #   - `moon test --enable-coverage` 生成 coverage 数据
  #   - `moon coverage analyze` 输出未覆盖行 (冷分支定位, 失败即 fail)
  #   - `moon coverage report -f summary` 输出 per-file 覆盖比
  #   - `scripts/check_coverage.ps1` 解析 summary, 仅对 src/ 核心库
  #      聚合 line-coverage, < 85% 则退出码 1 让 CI 红。
  #   门禁范围: src/**。examples/** 与 cmd/main 是演示/入口代码, 不算
  #   库的"正向逻辑覆盖率"; tests/pbt/gen 是测试侧生成器, 同理排除。
  # ─────────────────────────────────────────────────────────────
  coverage:
    name: coverage (wasm-gc)
    runs-on: ubuntu-latest
    timeout-minutes: 15                       # R10-AC5 · 15 分钟超时兜底(task 9.2)
    needs: ci
    env:
      COVERAGE_THRESHOLD: '85'                # task 28.2 / R6.1 / R10.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        uses: hustcer/setup-moonbit@v1

      # 关卡 4a: 启用覆盖率开关重跑 test, 生成 coverage artifacts
      - name: moon test --enable-coverage
        run: moon test --enable-coverage

      # 关卡 4b: analyze 已从 best-effort 升级为硬门禁 (去掉 || true)
      - name: moon coverage analyze
        run: moon coverage analyze

      # 关卡 4c: 打印 per-file summary, 留档 CI 日志方便 PR review
      - name: moon coverage report (summary)
        run: moon coverage report -f summary

      # 关卡 4d: 硬门禁 — src/ 核心库行覆盖率必须 ≥ 85%
      - name: Coverage gate (>= 85% on src/)
        shell: pwsh
        run: pwsh -File scripts/check_coverage.ps1

  # ─────────────────────────────────────────────────────────────
  # Job 3 · 文档构建 + 缺失 Doc 审计 (R5.6 · 对应 design.md §15.3)
  #   现状: MoonBit 0.9.x 的 `moon doc` 尚未提供 `--warn-on-missing`
  #   (见 `moon doc --help`, 只暴露 `--serve / --bind / --port`)。
  #   作为降级, 用两道关卡保证公开 API 有 Doc_Comment:
  #     1. `moon doc` 必须成功构建 (0 errors);
  #     2. `scripts/audit_doc.ps1` 静态审计每个 `pub fn/struct/...`
  #        上方是否紧邻 `///` Doc_Comment。
  #   该审计现在是硬门禁: 公开 API 缺少 Doc_Comment 会直接阻塞 PR。
  #   升级路径: 待工具链支持 `--warn-on-missing` 后, 可替换为官方门禁。
  # ─────────────────────────────────────────────────────────────
  doc:
    name: doc build
    runs-on: ubuntu-latest
    timeout-minutes: 15                       # R10-AC5 · 15 分钟超时兜底(task 9.2)
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        uses: hustcer/setup-moonbit@v1

      # moondoc 尚未适配新格式 moon.mod (内部仍读 moon.mod.json),
      # 仓库已按预验收要求删除废弃 moon.mod.json —— 这里临时生成一份
      # 等价 JSON 供 moon doc 使用, 用完即删, 不进仓库、不触发重复告警。
      - name: moon doc (build only, server disabled by default)
        shell: bash
        run: |
          set -euo pipefail
          cat > moon.mod.json <<'EOF'
          {
            "name": "Suquster/moonbit-pathfinding",
            "version": "0.0.4",
            "readme": "README.md",
            "repository": "https://github.com/Suquster/moonbit-pathfinding",
            "license": "Apache-2.0",
            "keywords": ["pathfinding", "graph", "algorithms", "dijkstra", "astar", "bfs", "jps", "runtime-contracts", "executable-docs", "osc-2026"],
            "description": "A MoonBit pathfinding and graph algorithms library with executable documentation, runtime-checked proof predicates, and multi-backend verification gates. Built for OSC 2026."
          }
          EOF
          moon doc
          rm -f moon.mod.json

      # 缺失 Doc_Comment 审计脚本 (task 18.3 降级方案)
      # 扫描所有 `pub fn/struct/enum/trait/impl/let/type`,
      # 若上方紧邻缺失 `///` 注释则打印清单并让 CI fail。
      - name: Audit missing Doc_Comment
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File scripts/audit_doc.ps1

  # ─────────────────────────────────────────────────────────────
  # Job 3b · 证据索引断链门禁 (H-4 + G-C2)
  #   `docs/verification/evidence_index.psv` 中每条 claim|test_ref|commit
  #   三元组必须可回放: test_ref 指向真实包目录、commit 存在于 git 历史。
  #   任一断链即 fail, 防止"证据漂移"(代码删了、索引还在吹)。
  #   需要完整 git 历史 (fetch-depth: 0) 以校验历史 commit 存在性。
  # ─────────────────────────────────────────────────────────────
  evidence:
    name: evidence guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evidence index guard
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File scripts/evidence_guard.ps1

  # ─────────────────────────────────────────────────────────────
  # Job 4 · 形式化证明 (task 34.4 · R8.3 · R10.3)
  #   在 release 分支 (main / tags v*) 运行 `moon prove`。
  #   当前 MoonBit 的 `moon prove` 仍处于实验期且依赖 Why3/SMT solver。
  #   CI 调用 scripts/proof_evidence.ps1 记录 runtime predicates、
  #   `moon prove --help` 和静态证明环境状态。若 Why3 缺失,脚本会记录
  #   environment-gated blocker,不把它伪装成静态证明已完成。
  # ─────────────────────────────────────────────────────────────
  prove:
    name: moon prove (release branches only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        uses: hustcer/setup-moonbit@v1

      - name: Proof evidence
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File scripts/proof_evidence.ps1

